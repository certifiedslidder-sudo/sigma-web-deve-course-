<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Images</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <img height="230" src="image.png.jpg" alt="tbsm4l" /> <!--alt displays if your src is incorrect or not present-->
    <br />
    <table>
      <caption>
        SIBLING DETAILS😍❤️
      </caption>
      <thead>       <!--header-->
        <tr>  <!--table row-->
          <th>Name</th> <!--table heading-->
          <th>Designation</th><!--table heading-->
          <th>Favourite food</th><!--table heading-->
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>sneha</td><!--table data-->
          <td>coder 👩🏻‍💻</td><!--table data-->
          <td>biryani</td><!--table data-->
        </tr>
        <tr>
          <td colspan="2">sam</td> <!--suhana has 2 cells space now -->
          <td rowspan="2">chole and pizza</td>
        </tr>
        <tr>
          <td colspan="2">aarav</td>
        </tr>
      </tbody>
      <tfoot>    <!--footer-->
        <tr>
          <td colspan="2">suhana</td>
          <td rowspan="">foot🥿</td>
        </tr>
      </tfoot>
    </table>
    <ul type = square>             <!--unordered list tag-->
      <li>sneha</li>                 <!--list tag-->
      <li>suhana</li>
      <li>aarav</li>
    </ul>
    <ol type="I">                <!--ordered list tag-->
      <li>sneha</li>
      <li>suhana</li>
      <li>aarav</li>
    </ol>
  </body>
</html>
