<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and Block elements</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <p> <!--block element takes the whole width , thus next content occurs below them. ex- para , div    -->
        hey i am a para
    </p>
    <a href="http://google.com">google</a>  <!-- anchor tag is inline -->
    <div>i am a block element</div>
    <span>i am span and i am in line</span><a href=""> yes he is inline</a>
</body>
<!-- IMPORTANT NOTE
 we can change  inline to bloack and block to inline by setting the display property of the element.
 -->
</html>
