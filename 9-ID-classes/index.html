<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID and Classes in HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--  ID   =   an attribute, a unique identifier assigned to only one HTML element within a page, often used for unique styling and java script manipulations
      YOU CAN ALSO GENERATE LINKS USING ID, helps in linking{#id} - bring us to the poge that has this id
      
     CLASS   =   a class attribute lets you give the same name to multiple HTML element. class can be more than one-->
    <div id="firstdiv" class="red bg-yellow">first</div>
    <div id="seconddiv">second</div>
    <span class="red"></span>
</body>
</html>
